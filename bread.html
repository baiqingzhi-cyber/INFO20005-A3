<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bread - Cookies and More</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="products.js" defer></script>
    <script src="category.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <header>

    <h1>Shop</h1>

    <nav>
    <ul>
        <li><a href="cart.html" class="cart">Cart (<span id="cartCount">0</span>)</a></li>
        <li><a href="home.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
    </nav>

    </header>

    <main class="content">

    
    <section class="top-bar">
        <button class="back-btn">Go Back</button>
        <form class="search-form">
            <input class="search-input" type="text" placeholder="Search..." />
            <button class="search-btn" type="submit">Search</button>
        </form>
    </section>

    <div class="line-1">
        <div class="line"></div>
    </div>
    <h2>Bread</h2>

    <section class="bread">
    
    <div
        class="product-list"
        id="productList"
        data-category="bread"
    ></div>
    
    </section>

    </main>

    <footer>
    <section class="shop">
        <p>Factory Shop: 2/321 Victoria Rd, Malaga WA 6090</p>
        <p>Hours: 10:00 - 17:00 Mon to Fri<br>
            <span class="indent">10:00 - 16:00 Sat to Sun</span></p>
    </section>

    <section class="office">
        <p>Office: 5 Dyer Rd, Bassendean WA 6054</p>
        <p>Tel: 08 6278 3700</p>

    </section>
    </footer>

    <div class="modal-overlay" id="modalOverlay">
    <div class="modal">

        <button class="modal-close" id="modalCloseBtn">✕</button>

        <div class="modal-left">
            <img id="modalImg" src="" alt="">
        </div>

        <div class="modal-right">
            <h2 id="modalTitle"></h2>

            <p class="modal-price">
                <span id="modalPrice"></span>
                <span class="modal-weight"> / <span id="modalWeight"></span></span>
            </p>

            <p class="modal-desc" id="modalDesc"></p>

            <div class="modal-section">
                <h3>Allergens</h3>
                <p id="modalAllergens"></p>
            </div>

            <div class="modal-section">
                <h3>Storage</h3>
                <p id="modalStorage"></p>
            </div>

            <button class="modal-add-btn">Add to cart</button>
        </div>

    </div>
    </div>

</body>
</html>
