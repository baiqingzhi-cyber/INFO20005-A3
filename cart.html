<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Cookies and More</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="cart.js" defer></script>
</head>
<body>
    <header>

    <h1>Cart</h1>

    <nav>
    <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
    </nav>

    </header>

    <main class="content" style="margin-bottom: 150px;">
    
    <section class="top-bar">
        <button class="back-btn">Go Back</button>
    </section>
    
    <div class="two-col-layout">
    
    <section class="left-col">
        <div class="line-1">
            <div class="line"></div>
        </div>

        <h2>Cart</h2>

        <div id="cartContainer"></div>

       

    </section>
    
    <section class="right-col">
        <div class="line-1">
            <div class="line"></div>
        </div>

        <h2>Information</h2>

        <form class="pickup-form">
            <label>Delivery Method</label>
            <select id="deliveryMethod" required>
                <option value="pickup">Pickup</option>
                <option value="delivery">Delivery</option>
            </select>

            <label>Name</label>
            <input type="text" id="nameInput" required>

            <label>Phone</label>
            <input type="text" id="phoneInput" required>

            <label id="addressLabel"></label>
            <input type="text" id="addressInput">

            <label>Pickup Time</label>
            <input type="datetime-local" id="pickupTimeInput">
        </form>

    </section>
    </div>
    
    </main>

    <footer class="checkout">
        <div class="cart-summary">
            <h3>Subtotal: <span id="subtotal">$0.00</span></h3>
            <p>Incl. GST: <span id="gst">$0.00</span></p>
            <h3>Delivery Fee: <span id="deliveryFee">$0.00</span></h3>
        </div>

        <div class="checkout-area">
            <h2>Total: <span id="finalTotal">$0.00</span></h2>
            <button class="checkout-btn">Checkout</button>
        </div>
    
    </section>
    </footer>
</body>
</html>
