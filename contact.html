<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Cookies and More</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    
    <header>

    <h1>Contact</h1>

    <nav>
    <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
    </nav>

    </header>

    <main class="content">

        <section class="top-bar">
        <button class="back-btn">Go Back</button>
        </section>

        <div class="line-1">
            <div class="line"></div>
        </div>
        <h2>Enquiry Form</h2>

        <form class="enquiry-form">

        <div class="personal-detail">

            <div class="form-div">
            <label>Name</label>
            <input type="text" required>
            </div>

            <div class="form-div">
            <label>Phone Number</label>
            <input type="text" required>
            </div>

            <div class="form-div">
            <label>Email</label>
            <input type="text" required>
            </div>

        </div>

        <div class="enquiry">
            <label>Subject</label>
            <input type="text" class="subject-entry" required>

            <label>Text</label>
            <textarea class="enquiry-entry" placeholder="Type your enquiry here..."></textarea>
        </div>

        <button class="send-btn" type="submit">Submit</button>

        </form>





    </main>




    <footer>
    <section class="shop">
        <p>Factory Shop: 2/321 Victoria Rd, Malaga WA 6090</p>
        <p>Hours: 10:00 - 17:00 Mon to Fri<br>
            <span class="indent">10:00 - 16:00 Sat to Sun</span></p>
    </section>

    <section class="office">
        <p>Office: 5 Dyer Rd, Bassendean WA 6054</p>
        <p>Tel: 08 6278 3700</p>

    </section>
    </footer>
</body>
</html>
